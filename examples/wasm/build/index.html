<!DOCTYPE html>
<html>

<head>
  <script src="wasm_exec.js"></script>
  <script src="sdl.js"></script>
</head>

<body>
  <canvas id="canvas"></canvas>
  <script>
    async function run() {
      const sdlModule = await createSDLModule({
        canvas: document.getElementById('canvas')
      });

      // List all of the available SDL functions
      // console.log("SDL available functions: ", Object.keys(sdlModule).filter(k => k.startsWith("_SDL")));
      // console.log("SDL_IMG available functions: ", Object.keys(sdlModule).filter(k => k.startsWith("_IMG")));
      // console.log("SDL_TTF available functions: ", Object.keys(sdlModule).filter(k => k.startsWith("_TTF")));

      const colorPtr = sdlModule._malloc(4);
      const dummyFPoint = sdlModule._malloc(8);
      const dummyFPoint2 = sdlModule._malloc(8);
      const dummyFPoint3 = sdlModule._malloc(8);
      const dummyFRect = sdlModule._malloc(16);
      const dummyFRect2 = sdlModule._malloc(16);
      const dummyEvent = sdlModule._malloc(128);
      const memoryBuffer = sdlModule._malloc(1024 * 1024 * 10); // 10MB buffer
      const memoryBufferView = new Uint8Array(sdlModule.HEAPU8.buffer, memoryBuffer, 1024 * 1024 * 10);

      window.sdlBridge = new Proxy({}, {
        get: (target, prop) => {
          switch (prop) {
            case "getMemoryBufferPtr": return () => { return memoryBuffer; };
            case "getMemoryBufferView": return () => { return memoryBufferView; };
            case "copyBytes": return (ptr, length) => {
              const view = new Uint8Array(sdlModule.HEAPU8.buffer, ptr, length);
              return new Uint8Array(view);
            };
            case "getValue": return (ptr, type) => { return sdlModule.getValue(ptr, type); };

            case "SDL_GetRevision": return () => { return sdlModule.UTF8ToString(sdlModule._SDL_GetRevision()); };
            case "SDL_GetError": return () => { return sdlModule.UTF8ToString(sdlModule._SDL_GetError()); };
            case "SDL_GetWindowTitle": return (window) => { return sdlModule.UTF8ToString(sdlModule._SDL_GetWindowTitle(window)); };
            case "SDL_CreateWindow": return (title, w, h, flags) => {
              const titlePtr = sdlModule.allocateUTF8(title);
              const windowPtr = sdlModule._SDL_CreateWindow(titlePtr, w, h, BigInt(flags));
              sdlModule._free(titlePtr); // Free memory allocated by the string
              return windowPtr;
            };
            case "SDL_CreateRenderer": return (window, name) => {
              const namePtr = sdlModule.allocateUTF8(name);
              const rendererPtr = sdlModule._SDL_CreateRenderer(window, namePtr);
              sdlModule._free(namePtr); // Free memory allocated by the string
              return rendererPtr;
            };
            case "SDL_RenderFillRect": return (renderer, x, y, w, h) => {
              let r;
              if (x != undefined && y != undefined && w != undefined && h != undefined) {
                sdlModule.HEAPF32.set([x, y, w, h], dummyFRect >> 2);
                r = dummyFRect;
              }
              return sdlModule._SDL_RenderFillRect(renderer, r);
            };
            case "SDL_PollEvent": return (event) => {
              const res = sdlModule._SDL_PollEvent(dummyEvent);
              return [res, sdlModule.HEAPU8.subarray(dummyEvent, dummyEvent + 128)];
            };
            case "SDL_RenderDebugText": return (renderer, x, y, str) => {
              const textPtr = sdlModule.allocateUTF8(str);
              const res = sdlModule._SDL_RenderDebugText(renderer, x, y, textPtr);
              sdlModule._free(textPtr); // Free memory allocated by the string
              return res;
            }
            case "SDL_RenderDebugTextFormat": return (renderer, x, y, str) => {
              const textPtr = sdlModule.allocateUTF8(str);
              const res = sdlModule._SDL_RenderDebugTextFormat(renderer, x, y, textPtr);
              sdlModule._free(textPtr); // Free memory allocated by the string
              return res;
            }
            case "SDL_GetRenderDriver": return (index) => { return sdlModule.UTF8ToString(sdlModule._SDL_GetRenderDriver(index)); };
            case "SDL_GetRendererName": return (renderer) => { return sdlModule.UTF8ToString(sdlModule._SDL_GetRendererName(renderer)); };
            case "SDL_CreateWindowAndRenderer": return (title, width, height, flags, window, renderer) => {
              const windowTmpPtr = sdlModule._malloc(8); // 8 byte pointer
              const rendererTmpPtr = sdlModule._malloc(8);
              const titlePtr = sdlModule.allocateUTF8(title);
              const res = sdlModule._SDL_CreateWindowAndRenderer(titlePtr, width, height, BigInt(flags), windowTmpPtr, rendererTmpPtr);
              let windowPtr = 0, rendererPtr = 0;
              if (res != 0) {
                windowPtr = Number(sdlModule.getValue(windowTmpPtr, "i32"));
                rendererPtr = Number(sdlModule.getValue(rendererTmpPtr, "i32"));
              }
              sdlModule._free(titlePtr);
              sdlModule._free(rendererTmpPtr);
              sdlModule._free(windowTmpPtr);
              return [res, windowPtr, rendererPtr];
            };
            case "SDL_GetPerformanceFrequency": return () => { return Number(sdlModule._SDL_GetPerformanceFrequency()); };
            case "SDL_GetPerformanceCounter": return () => { return Number(sdlModule._SDL_GetPerformanceCounter()); };
            case "SDL_RenderRect": return (renderer, x, y, w, h) => {
              let r;
              if (x != undefined && y != undefined && w != undefined && h != undefined) {
                sdlModule.HEAPF32.set([x, y, w, h], dummyFRect >> 2);
                r = dummyFRect;
              }
              return sdlModule._SDL_RenderRect(renderer, r);
            };
            case "SDL_RenderLines": return (renderer, count) => {
              let buff;
              if (count != -1) { buff = memoryBuffer; }
              return sdlModule._SDL_RenderLines(renderer, buff, count);
            };
            case "SDL_RenderRects": return (renderer, count) => {
              let buff;
              if (count != -1) { buff = memoryBuffer; }
              return sdlModule._SDL_RenderRects(renderer, buff, count);
            };
            case "SDL_RenderFillRects": return (renderer, count) => {
              let buff;
              if (count != -1) { buff = memoryBuffer; }
              return sdlModule._SDL_RenderFillRects(renderer, buff, count);
            };
            case "SDL_RenderPoints": return (renderer, count) => {
              let buff;
              if (count != -1) { buff = memoryBuffer; }
              return sdlModule._SDL_RenderPoints(renderer, buff, count);
            };
            case "SDL_SetPointerProperty": return (props, name, value) => {
              const namePtr = sdlModule.allocateUTF8(name);
              const res = sdlModule._SDL_SetPointerProperty(props, namePtr, value);
              sdlModule._free(namePtr); // Free memory allocated by the string
              return res;
            };
            case "SDL_SetNumberProperty": return (props, name, value) => {
              const namePtr = sdlModule.allocateUTF8(name);
              const res = sdlModule._SDL_SetNumberProperty(props, namePtr, BigInt(value));
              sdlModule._free(namePtr); // Free memory allocated by the string
              return res;
            };
            case "SDL_LoadBMP": return (file) => {
              const filePtr = sdlModule.allocateUTF8(file);
              const res = sdlModule._SDL_LoadBMP(filePtr);
              sdlModule._free(filePtr); // Free memory allocated by the string
              return res;
            };
            case "SDL_IOFromConstMem": return (size) => { return sdlModule._SDL_IOFromConstMem(memoryBuffer, size); };
            case "SDL_IOFromMem": return (size) => { return sdlModule._SDL_IOFromMem(memoryBuffer, size); };
            case "SDL_RenderTexture": return (renderer, texture,
              srcrectX, srcrectY, srcrectW, srcrectH,
              dstrectX, dstrectY, dstrectW, dstrectH) => {
              let r1, r2;
              if (srcrectX != undefined || srcrectY != undefined || srcrectW != undefined || srcrectH != undefined) {
                sdlModule.HEAPF32.set([srcrectX, srcrectY, srcrectW, srcrectH], dummyFRect >> 2);
                r1 = dummyFRect;
              }
              if (dstrectX != undefined || dstrectY != undefined || dstrectW != undefined || dstrectH != undefined) {
                sdlModule.HEAPF32.set([dstrectX, dstrectY, dstrectW, dstrectH], dummyFRect2 >> 2);
                r2 = dummyFRect2;
              }
              return sdlModule._SDL_RenderTexture(renderer, texture, r1, r2);
            };
            case "SDL_RenderTextureRotated": return (renderer, texture,
              srcrectX, srcrectY, srcrectW, srcrectH,
              dstrectX, dstrectY, dstrectW, dstrectH,
              angle,
              centerX, centerY,
              flip) => {
              let r1, r2, p;
              if (srcrectX != undefined && srcrectY != undefined && srcrectW != undefined && srcrectH != undefined) {
                sdlModule.HEAPF32.set([srcrectX, srcrectY, srcrectW, srcrectH], dummyFRect >> 2);
                r1 = dummyFRect;
              }
              if (dstrectX != undefined && dstrectY != undefined && dstrectW != undefined && dstrectH != undefined) {
                sdlModule.HEAPF32.set([dstrectX, dstrectY, dstrectW, dstrectH], dummyFRect2 >> 2);
                r2 = dummyFRect2;
              }
              if (centerX != undefined && centerY != undefined) {
                sdlModule.HEAPF32.set([centerX, centerY], dummyFPoint >> 2);
                p = dummyFPoint;
              }
              return sdlModule._SDL_RenderTextureRotated(renderer, texture, r1, r2, angle, p, flip);
            };
            case "SDL_RenderTexture9Grid": return (renderer, texture,
              srcrectX, srcrectY, srcrectW, srcrectH,
              leftWidth, rightWidth, topHeight, bottomHeight, scale,
              dstrectX, dstrectY, dstrectW, dstrectH) => {
              let r1, r2;
              if (srcrectX != undefined && srcrectY != undefined && srcrectW != undefined && srcrectH != undefined) {
                sdlModule.HEAPF32.set([srcrectX, srcrectY, srcrectW, srcrectH], dummyFRect >> 2);
                r1 = dummyFRect;
              }
              if (dstrectX != undefined && dstrectY != undefined && dstrectW != undefined && dstrectH != undefined) {
                sdlModule.HEAPF32.set([dstrectX, dstrectY, dstrectW, dstrectH], dummyFRect2 >> 2);
                r2 = dummyFRect2;
              }
              return sdlModule._SDL_RenderTexture9Grid(renderer, texture, r1, leftWidth, rightWidth, topHeight, bottomHeight, scale, r2);
            };
            case "SDL_RenderTextureTiled": return (renderer, texture,
              srcrectX, srcrectY, srcrectW, srcrectH,
              scale,
              dstrectX, dstrectY, dstrectW, dstrectH) => {
              let r1, r2;
              if (srcrectX != undefined && srcrectY != undefined && srcrectW != undefined && srcrectH != undefined) {
                sdlModule.HEAPF32.set([srcrectX, srcrectY, srcrectW, srcrectH], dummyFRect >> 2);
                r1 = dummyFRect;
              }
              if (dstrectX != undefined && dstrectY != undefined && dstrectW != undefined && dstrectH != undefined) {
                sdlModule.HEAPF32.set([dstrectX, dstrectY, dstrectW, dstrectH], dummyFRect2 >> 2);
                r2 = dummyFRect2;
              }
              return sdlModule._SDL_RenderTextureTiled(renderer, texture, r1, scale, r2);
            };
            case "SDL_RenderGeometry": return (renderer, texture, numVertices, numIndices, indicesOffset) => {
              let verticesBuffer, indicesBuffer;
              if (numVertices != -1) { verticesBuffer = memoryBuffer; }
              if (numIndices != -1) { indicesBuffer = memoryBuffer + indicesOffset }
              return sdlModule._SDL_RenderGeometry(renderer, texture, verticesBuffer, numVertices, indicesBuffer, numIndices);
            };
            case "SDL_LoadWAV_IO": return (src, closeio) => {
              const specPtr = sdlModule._malloc(8);
              const audioBufPtr = sdlModule._malloc(8);
              const audioLenPtr = sdlModule._malloc(8);
              const res = sdlModule._SDL_LoadWAV_IO(src, closeio, specPtr, audioBufPtr, audioLenPtr);
              const dataPtr = sdlModule.getValue(audioBufPtr, "i32");
              const len = sdlModule.getValue(audioLenPtr, "i32");
              sdlModule._free(audioBufPtr); // Free memory allocated for data pointer
              sdlModule._free(audioLenPtr); // Free memory allocated for length pointer
              return [res, specPtr, dataPtr, len];
            };
            case "SDL_RenderTextureAffine": return (renderer, texture,
              srX, srY, srW, srH,
              p1X, p1Y, p2X, p2Y, p3X, p3Y) => {
              let r1, p1, p2, p3;
              if (srX != undefined && srY != undefined && srW != undefined && srH != undefined) {
                sdlModule.HEAPF32.set([srX, srY, srW, srH], dummyFRect >> 2);
                r1 = dummyFRect;
              }
              if (p1X != undefined && p1Y != undefined) {
                sdlModule.HEAPF32.set([p1X, p1Y], dummyFPoint >> 2);
                p1 = dummyFPoint;
              }
              if (p2X != undefined && p2Y != undefined) {
                sdlModule.HEAPF32.set([p2X, p2Y], dummyFPoint2 >> 2);
                p2 = dummyFPoint2;
              }
              if (p3X != undefined && p3Y != undefined) {
                sdlModule.HEAPF32.set([p3X, p3Y], dummyFPoint3 >> 2);
                p3 = dummyFPoint3;
              }
              return sdlModule._SDL_RenderTextureAffine(renderer, texture, r1, p1, p2, p3);
            };

            case "TTF_AppendTextString": return (text, str, length) => {
              const textPtr = sdlModule.allocateUTF8(str);
              const res = sdlModule._TTF_AppendTextString(text, textPtr, length);
              sdlModule._free(textPtr); // Free memory allocated by the string
              return res;
            };
            case "TTF_CreateText": return (engine, font, text, length) => {
              const textPtr = sdlModule.allocateUTF8(text);
              const res = sdlModule._TTF_CreateText(engine, font, textPtr, length);
              sdlModule._free(textPtr); // Free memory allocated by the string
              return res;
            };
            case "TTF_GetFontDPI": return (font) => {
              const vdpiPtr = sdlModule._malloc(4);
              const res = sdlModule._TTF_GetFontDPI(font, colorPtr, vdpiPtr);
              const hdpi = sdlModule.getValue(colorPtr, "i32"); // ColorPtr is reused for hdpi
              const vdpi = sdlModule.getValue(vdpiPtr, "i32");
              sdlModule._free(vdpiPtr); // Free memory allocated for vdpi pointer
              return [res, hdpi, vdpi];
            };
            case "TTF_GetFontFamilyName": return (font) => { return sdlModule.UTF8ToString(sdlModule._TTF_GetFontFamilyName(font)); };
            case "TTF_GetFontStyleName": return (font) => { return sdlModule.UTF8ToString(sdlModule._TTF_GetFontStyleName(font)); };
            case "TTF_GetFreeTypeVersion": return () => {
              sdlModule._TTF_GetFreeTypeVersion(colorPtr, dummyFPoint >> 2, dummyFPoint);
              return [sdlModule.getValue(colorPtr, "i32"), sdlModule.getValue(dummyFPoint, "i32"), sdlModule.getValue(dummyFPoint >> 2, "i32")];
            };
            case "TTF_GetGlyphMetrics": return (font, ch) => {
              const res = sdlModule._TTF_GetGlyphMetrics(font, ch, colorPtr, dummyFRect, dummyFRect >> 2, dummyFRect >> 4, dummyFRect >> 8);
              return [res, sdlModule.getValue(colorPtr, "i32"), sdlModule.getValue(dummyFRect, "i32"), sdlModule.getValue(dummyFRect >> 2, "i32"),
                sdlModule.getValue(dummyFRect >> 4, "i32"), sdlModule.getValue(dummyFRect >> 8, "i32")];
            };
            case "TTF_GetHarfBuzzVersion": return () => {
              sdlModule._TTF_GetHarfBuzzVersion(colorPtr, dummyFPoint, dummyFPoint >> 2);
              return [sdlModule.getValue(colorPtr, "i32"), sdlModule.getValue(dummyFPoint, "i32"), sdlModule.getValue(dummyFPoint >> 2, "i32")];
            };
            case "TTF_GetStringSize": return (font, text, length) => {
              const textPtr = sdlModule.allocateUTF8(text);
              const res = sdlModule._TTF_GetStringSize(font, textPtr, length, dummyFPoint, dummyFPoint >> 2);
              sdlModule._free(textPtr); // Free memory allocated by the string
              return [res, sdlModule.getValue(dummyFPoint, "i32"), sdlModule.getValue(dummyFPoint >> 2, "i32")];
            };
            case "TTF_GetStringSizeWrapped": return (font, text, length, wrapWidth) => {
              const textPtr = sdlModule.allocateUTF8(text);
              const res = sdlModule._TTF_GetStringSizeWrapped(font, textPtr, length, wrapWidth, dummyFPoint, dummyFPoint >> 2);
              sdlModule._free(textPtr); // Free memory allocated by the string
              return [res, sdlModule.getValue(dummyFPoint, "i32"), sdlModule.getValue(dummyFPoint >> 2, "i32")];
            };
            case "TTF_GetTextSize": return (text) => {
              const res = sdlModule._TTF_GetTextSize(text, dummyFPoint, dummyFPoint >> 2);
              return [res, sdlModule.getValue(dummyFPoint, "i32"), sdlModule.getValue(dummyFPoint >> 2, "i32")];
            };
            case "TTF_RenderGlyph_Blended": return (font, ch, fg) => {
              sdlModule.HEAPU8.set([fg & 0xFF, (fg >> 8) & 0xFF, (fg >> 16) & 0xFF, (fg >> 24) & 0xFF], colorPtr);
              return sdlModule._TTF_RenderGlyph_Blended(font, ch, colorPtr);
            };
            case "TTF_RenderGlyph_Solid": return (font, ch, fg) => {
              sdlModule.HEAPU8.set([fg & 0xFF, (fg >> 8) & 0xFF, (fg >> 16) & 0xFF, (fg >> 24) & 0xFF], colorPtr);
              return sdlModule._TTF_RenderGlyph_Solid(font, ch, colorPtr);
            };
            case "TTF_RenderText_Blended": return (font, text, length, fg) => {
              sdlModule.HEAPU8.set([fg & 0xFF, (fg >> 8) & 0xFF, (fg >> 16) & 0xFF, (fg >> 24) & 0xFF], colorPtr);
              const textPtr = sdlModule.allocateUTF8(text);
              const res = sdlModule._TTF_RenderText_Blended(font, textPtr, length, colorPtr);
              sdlModule._free(textPtr); // Free memory allocated by the string
              return res;
            };
            case "TTF_RenderText_Blended_Wrapped": return (font, text, length, fg, wrapWidth) => {
              sdlModule.HEAPU8.set([fg & 0xFF, (fg >> 8) & 0xFF, (fg >> 16) & 0xFF, (fg >> 24) & 0xFF], colorPtr);
              const textPtr = sdlModule.allocateUTF8(text);
              const res = sdlModule._TTF_RenderText_Blended_Wrapped(font, textPtr, length, colorPtr, wrapWidth);
              sdlModule._free(textPtr); // Free memory allocated by the string
              return res;
            };
            case "TTF_RenderText_Solid": return (font, text, length, fg) => {
              sdlModule.HEAPU8.set([fg & 0xFF, (fg >> 8) & 0xFF, (fg >> 16) & 0xFF, (fg >> 24) & 0xFF], colorPtr);
              const textPtr = sdlModule.allocateUTF8(text);
              const res = sdlModule._TTF_RenderText_Solid(font, textPtr, length, colorPtr);
              sdlModule._free(textPtr); // Free memory allocated by the string
              return res;
            };
            case "TTF_SetTextString": return (text, str, length) => {
              const textPtr = sdlModule.allocateUTF8(str);
              const res = sdlModule._TTF_SetTextString(text, textPtr, length);
              sdlModule._free(textPtr); // Free memory allocated by the string
              return res;
            };

            default:
              const funcName = prop.startsWith('_') ? prop : '_' + prop;
              const func = sdlModule[funcName];
              if (typeof func !== 'function') {
                console.error("SDL3 binding, couldn't find function:", prop);
                return () => 0;
              }
              return func.bind(sdlModule);
          }
        }
      });

      const go = new Go();
      const result = await WebAssembly.instantiateStreaming(
        fetch("go.wasm"),
        go.importObject
      );
      go.run(result.instance);
    }

    run().catch(console.error);
  </script>
</body>

</html>
